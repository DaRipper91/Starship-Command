<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark Deep Slate Blue-Grey Background -->
    <rect id="bg" width="1024" height="1024" rx="220" fill="#2d333b" />
    
    <!-- Pastel Gradients -->
    <linearGradient id="rocketGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#82aaff;stop-opacity:1" /> <!-- Pastel Blue -->
      <stop offset="100%" style="stop-color:#c792ea;stop-opacity:1" /> <!-- Muted Lavender -->
    </linearGradient>
    
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Render Background -->
  <use href="#bg" />
  
  <!-- Stylized Command-Line Prompt (>) -->
  <path d="M 280 320 L 520 512 L 280 704" 
        fill="none" 
        stroke="#b4f9f8" 
        stroke-width="60" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        opacity="0.9"
        filter="url(#softGlow)" />
  
  <!-- Minimalist Rocket Ship Silhouette -->
  <g transform="translate(500, 220) scale(1.1)">
    <!-- Main Body -->
    <path d="M 100 0 
             C 160 120, 160 350, 160 450 
             L 40 450 
             C 40 350, 40 120, 100 0 Z" 
          fill="url(#rocketGrad)" 
          filter="url(#softGlow)" />
    
    <!-- Fins (Lavender) -->
    <path d="M 40 350 L -20 480 L 40 450 Z" fill="#c792ea" opacity="0.8" />
    <path d="M 160 350 L 220 480 L 160 450 Z" fill="#c792ea" opacity="0.8" />
    
    <!-- Engine Port (Mint Green) -->
    <rect x="75" y="450" width="50" height="20" rx="5" fill="#b4f9f8" />
    
    <!-- Exhaust Glow (Soft Pink/Peach) -->
    <path d="M 80 470 L 120 470 L 100 540 Z" fill="#f07178" opacity="0.6" filter="url(#softGlow)" />
  </g>
</svg>
