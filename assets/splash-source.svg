<svg width="1080" height="1920" viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg">
  <!-- Deep Slate Background -->
  <rect width="1080" height="1920" fill="#1a1b26" />
  
  <defs>
    <radialGradient id="nebula" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#c792ea;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#1a1b26;stop-opacity:0" />
    </radialGradient>
    
    <filter id="blurCode" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" />
    </filter>
    
    <filter id="shipGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Nebula Ambient Light -->
  <circle cx="540" cy="960" r="800" fill="url(#nebula)" />

  <!-- Galaxy of Code Lines (Abstract representation) -->
  <g opacity="0.3" filter="url(#blurCode)">
    <path d="M 100 200 L 400 200" stroke="#82aaff" stroke-width="2" stroke-dasharray="10,20" />
    <path d="M 600 400 L 900 400" stroke="#c792ea" stroke-width="1" />
    <path d="M 200 800 L 500 800" stroke="#b4f9f8" stroke-width="2" stroke-dasharray="5,15" />
    <path d="M 700 1200 L 1000 1200" stroke="#f07178" stroke-width="1" />
    <!-- Floating Terminal Syntax Particles -->
    <text x="50" y="350" fill="#82aaff" font-family="monospace" font-size="14">❯ starship init</text>
    <text x="800" y="600" fill="#c792ea" font-family="monospace" font-size="12">[directory]</text>
    <text x="150" y="1500" fill="#b4f9f8" font-family="monospace" font-size="14">git_status</text>
    <text x="700" y="1700" fill="#f07178" font-family="monospace" font-size="12">success_symbol</text>
  </g>

  <!-- Minimalist Starship Cruising (Centered) -->
  <g transform="translate(540, 1100) rotate(-45)">
    <path d="M 0 -60 
             C 30 0, 30 100, 30 150 
             L -30 150 
             C -30 100, -30 0, 0 -60 Z" 
          fill="#c792ea" filter="url(#shipGlow)" />
    <!-- Fins -->
    <path d="M -30 80 L -60 160 L -30 150 Z" fill="#82aaff" />
    <path d="M 30 80 L 60 160 L 30 150 Z" fill="#82aaff" />
    <!-- Engine Trail (Soft Pink) -->
    <path d="M -15 150 L 15 150 L 0 250 Z" fill="#f07178" opacity="0.4" filter="url(#shipGlow)">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="2s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- Centered Negative Space for App Logo -->
  <circle cx="540" cy="800" r="150" fill="none" />
</svg>
