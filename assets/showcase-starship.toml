$schema = "https://starship.rs/config-schema.json"

format = """
[╭─ ](bold #a3aed2)$os$username[](bg:#394260 fg:#a3aed2)$directory[](fg:#394260 bg:#212736)$git_branch$git_status[](fg:#212736 bg:#1d2230)$nodejs$rust$golang[](fg:#1d2230 bg:#06969A)$docker_context[](fg:#06969A bg:#33658A)$time[ ](fg:#33658A)
[╰─](bold #a3aed2)$character"""

[os]
disabled = false
style = "bg:#a3aed2 fg:#090c0c"

[os.symbols]
Arch = "󰣇 "

[username]
show_always = true
style_user = "bg:#a3aed2 fg:#090c0c"
style_root = "bg:#a3aed2 fg:#090c0c"
format = '[$user ]($style)'

[directory]
style = "bg:#394260 fg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#212736)]($style)'

[git_status]
style = "bg:#212736"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#212736)]($style)'

[nodejs]
symbol = ""
style = "bg:#1d2230"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#1d2230)]($style)'

[rust]
symbol = ""
style = "bg:#1d2230"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#1d2230)]($style)'

[golang]
symbol = ""
style = "bg:#1d2230"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#1d2230)]($style)'

[docker_context]
symbol = ""
style = "bg:#06969A"
format = '[[ $symbol $context ](fg:#83a598 bg:#06969A)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:#33658A"
format = '[[  $time ](fg:#a0a9cb bg:#33658A)]($style)'

[character]
success_symbol = "[ 󰘧 ](bold #a0a9cb)"
error_symbol = "[ 󰘧 ](bold #ec6a88)"
