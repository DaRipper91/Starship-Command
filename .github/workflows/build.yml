name: Build & Release Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  web-build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          
      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run Tests
        run: pnpm test -- --run

      - name: Build Web App
        run: pnpm run build

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/

  android-build:
    needs: web-build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Dependencies
        run: pnpm install

      - name: Download Web Artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/

      - name: Sync Capacitor
        run: |
          pnpm exec cap sync android

      - name: Build APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: starship-command-android.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  linux-desktop-build:
    needs: web-build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Dependencies (Root)
        run: pnpm install

      - name: Download Web Artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/
          
      - name: Install Desktop Dependencies
        working-directory: ./platforms/desktop
        run: pnpm install --no-frozen-lockfile

      - name: Build Desktop (Vite/Electron)
        working-directory: ./platforms/desktop
        run: |
          pnpm approve-builds
          pnpm run build

      - name: Build Electron App (AppImage)
        working-directory: ./platforms/desktop
        run: pnpm exec electron-builder --linux AppImage --arm64 --x64

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-desktop-builds
          path: platforms/desktop/dist/*.AppImage
